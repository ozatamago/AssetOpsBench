services:
  assetopsbench:
    platform: linux/amd64
    image: quay.io/assetopsbench/assetopsbench-extra
    volumes:
      - ./track1_result:/home/track1_result

      - ./entrypoint_spiral.sh:/home/entrypoint.sh
      - ./run_track_1_spiral_without_critic.py:/home/run_track_1.py
      - ../../src/agent_hive/workflows/track1_planning_spiral_without_critic.py:/opt/conda/envs/assetopsbench/lib/python3.12/site-packages/agent_hive/workflows/track1_planning.py
      
      - ../../src/assetopsbench/sample_data:/sample_data:ro
      - ../../scenarios:/home/scenarios:ro  
      - ../../summarize.py:/home/summarize.py  
      - ../../auto_scoring.py:/home/auto_scoring.py  
      - ../../src/agent_hive/workflows/simulator_agent.py:/opt/conda/envs/assetopsbench/lib/python3.12/site-packages/agent_hive/workflows/simulator_agent.py
      - ../../src/agent_hive/workflows/critic_agent.py:/opt/conda/envs/assetopsbench/lib/python3.12/site-packages/agent_hive/workflows/critic_agent.py
      - ../../src/agent_hive/workflows/critic_agent_without_simulator.py:/opt/conda/envs/assetopsbench/lib/python3.12/site-packages/agent_hive/workflows/critic_agent_without_simulator.py
    env_file:
      - .env.local # changed from .env
    environment:
      DATABASE_URL: postgresql://aob:aobpass@postgres:5432/aobdb
      DB_URL:       postgresql://aob:aobpass@postgres:5432/aobdb    
    command: ["/home/entrypoint.sh"]
  couchdb:
    build:
      context: .
      dockerfile: Dockerfile.couchdb
    image: cods-track1-couchdb:3.5     # couchdb:3.5 を上書きしない方が安全
    restart: always
    ports:
      - "5984:5984"
    env_file:
      - .env.local
    environment:
      # CouchDB公式イメージが要求するキーは “確実に” 渡す
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    volumes:
      - couchdb-data:/opt/couchdb/data
    # ★ ここを削除：サーバが起動しなくなる
    # command: ["sh", "/opt/couchdb/etc/couchdb_setup.sh"]

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5984/_up >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
  couchdb_init:
    image: cods-track1-couchdb:3.5
    depends_on:
      couchdb:
        condition: service_healthy
    env_file:
      - .env.local
    volumes:
      - ./couchdb_setup.sh:/opt/couchdb/etc/couchdb_setup.sh:ro
      - ../../src/assetopsbench/sample_data:/sample_data:ro
    restart: "no"
    entrypoint: ["bash", "-lc"]
    command: >
      export JSON_PATH="/sample_data/main.json" &&
      /opt/couchdb/etc/couchdb_setup.sh

  postgres:
    build: ../../infra/postgres
    environment:
      POSTGRES_USER: aob
      POSTGRES_PASSWORD: aobpass
      POSTGRES_DB: aobdb
      
    ports: ["15432:5432"]
    volumes:
      - ../../infra/postgres/data:/var/lib/postgresql/data
      - ../../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  couchdb-data: {}
